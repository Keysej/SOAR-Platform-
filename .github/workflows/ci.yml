name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check ingestion/

      - name: Type-check with mypy
        run: |
          pip install mypy
          mypy ingestion/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short --cov=ingestion 2>/dev/null \
            || echo "No tests yet — skipping."
